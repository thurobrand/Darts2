services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: darts2-backend
    restart: unless-stopped
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: darts2-frontend
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
